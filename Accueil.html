<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Campus Melody - Accueil</title>
    <link rel="stylesheet" href="Style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#0B0B0F] text-[#F5F5F7] min-h-screen">
    <div class="flex min-h-screen">
        <aside class="w-64 bg-[#18181B] border-r border-[#27272A] flex flex-col h-screen sticky top-0">
            <div class="p-8 flex items-center gap-3">
                <div class="w-9 h-9 bg-[#A78BFA]/10 rounded-xl border border-[#A78BFA]/30 flex items-center justify-center text-lg">🎵</div>
                <h1 class="text-sm font-bold">Campus Melody</h1>
            </div>
            <nav class="flex-1 px-3">
                <p class="text-[10px] text-[#A1A1AA] uppercase px-3 mb-4">Pages</p>
                <div id="sidebar-nav" class="space-y-1"></div>
            </nav>
        </aside>

        <main class="flex-1 p-10">
            <div class="top-bar w-full mb-8 flex justify-between items-center"> 
                <div><h2 class="text-3xl font-bold">Accueil</h2><p class="text-[#A1A1AA]">Ravi de vous revoir 👋</p></div>
                <div class="user-actions flex gap-3"><button class="icon-btn">🔔</button><div class="user-avatar">JM</div></div>
            </div>

            <div class="dashboard-container">
                <a href="Catalogue.html" class="card">
                    <div class="card-header"><div class="card-icon icon-event">📅</div><span class="badge">ÉVÉNEMENTS</span></div>
                    <div><h5>Catalogue</h5><p>Parcourir et s'inscrire aux activités</p></div>
                </a>
                <a href="Creation_evenement.html" class="card card-create">
                    <div class="card-icon" style="background: rgba(167, 139, 250, 0.2);">✨</div>
                    <div><h5>Créer un événement</h5><p>Proposer un concert, jam, workshop...</p></div>
                    <button class="btn-create">+ Nouvel événement</button>
                </a>
                <a href="Reservations.html" class="card">
                    <div class="card-icon icon-room">🎹</div>
                    <h5>Salles</h5><p>Réserver un studio de répétition</p>
                </a>
                <a href="Reservations.html" class="card">
                    <div class="card-icon icon-gear">🎤</div>
                    <h5>Matériel</h5><p>Emprunter du matériel audio</p>
                </a>
            </div>
        </main>
    </div>
    <script src="navigation.js"></script>
</body>
</html>
